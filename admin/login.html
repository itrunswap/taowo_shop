<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>云鲜运营台 · 登录</title>
<link rel="stylesheet" href="../assets/design-system.css">
<link rel="stylesheet" href="../assets/admin.css">
</head>
<body>
<div class="login-wrap">
  <!-- art -->
  <div class="login-art brand-hero">
    <div style="position:relative;z-index:1;">
      <div class="brand" style="padding:0;"><div class="logo" style="background:#fff;color:var(--brand);">鲜</div><div><div class="bt" style="color:#fff;font-size:20px;">云鲜运营台</div><div class="bs" style="color:rgba(255,255,255,.8);">YUNXIAN CONSOLE</div></div></div>
    </div>
    <div style="position:relative;z-index:1;">
      <div style="font-size:40px;font-weight:800;letter-spacing:-.03em;line-height:1.2;">让每一份团餐<br>都被精准经营</div>
      <div style="font-size:15px;opacity:.92;margin-top:16px;max-width:380px;line-height:1.7;">菜单排期 · 订单履约 · 会员增长 · 管家加盟，一个后台管理全链路餐饮生意。</div>
      <div class="row gap24 mt24" style="gap:32px;">
        <div><div style="font-size:30px;font-weight:800;">1,280+</div><div style="font-size:13px;opacity:.85;">入驻企业</div></div>
        <div><div style="font-size:30px;font-weight:800;">98.6%</div><div style="font-size:13px;opacity:.85;">准时履约率</div></div>
        <div><div style="font-size:30px;font-weight:800;">320</div><div style="font-size:13px;opacity:.85;">城市管家</div></div>
      </div>
    </div>
    <div style="position:relative;z-index:1;font-size:13px;opacity:.8;">© 2026 云鲜 YUNXIAN · 智慧团餐云平台</div>
  </div>

  <!-- form -->
  <div class="login-form">
    <div style="font-size:26px;font-weight:800;letter-spacing:-.02em;">欢迎回来 👋</div>
    <div class="page-desc">登录你的运营工作台</div>

    <div class="aseg mt24" style="align-self:flex-start;">
      <div class="s active" data-seg>账号密码</div>
      <div class="s" data-seg data-toast="已发送验证码至 138****6688">短信验证</div>
    </div>

    <div class="mt24" style="margin-top:28px;">
      <div class="field">
        <label class="label">账号</label>
        <input class="input" value="admin@yunxian.com" placeholder="邮箱 / 手机号">
      </div>
      <div class="field">
        <label class="label">密码</label>
        <input class="input" type="password" value="123456" placeholder="请输入密码">
      </div>
      <div class="row between center" style="margin:6px 0 22px;">
        <label class="row center gap6" style="font-size:13.5px;color:var(--ink-2);cursor:pointer;"><span class="switch on" style="width:38px;height:22px;"><i style="width:16px;height:16px;left:auto;right:3px;"></i></span> 记住登录</label>
        <a style="font-size:13.5px;color:var(--brand);font-weight:600;" data-toast="请联系超级管理员重置">忘记密码？</a>
      </div>
      <button class="abtn abtn-primary" style="width:100%;height:48px;font-size:15px;" data-go="dashboard.html">登录工作台</button>
      <div style="text-align:center;font-size:12.5px;color:var(--ink-3);margin-top:18px;">登录即代表同意《服务协议》与《隐私政策》</div>
    </div>
  </div>
</div>
<script src="../assets/admin.js"></script>
</body>
</html>
