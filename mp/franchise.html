<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>管家加盟</title>
<link rel="stylesheet" href="../assets/design-system.css">
</head>
<body>
<div class="screen">
  <div style="flex:none;background:linear-gradient(160deg,#2a2018,#1d1d1f);">
    <div class="statusbar on-brand"><span data-clock>9:41</span>
      <span class="sb-right">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 9h3v6H2zM7 6h3v9H7zM12 3h3v12h-3zM17 7h3v8h-3z"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13a10 10 0 0 1 14 0M8.5 16.5a5 5 0 0 1 7 0M12 20h.01"/></svg>
        <svg viewBox="0 0 26 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="7" width="18" height="10" rx="3"/><rect x="4" y="9" width="13" height="6" rx="1.5" fill="currentColor" stroke="none"/></svg>
      </span>
    </div>
    <div class="navbar on-brand"><button class="nav-btn" data-back><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 6l-6 6 6 6" stroke-linecap="round" stroke-linejoin="round"/></svg></button><span class="nav-title">管家加盟</span></div>
    <div class="page-pad" style="padding-bottom:24px;color:#fff;">
      <span class="badge badge-gold">招募合伙人</span>
      <div class="t-largetitle mt10" style="color:#fff;">成为云超鲜管家<br>开启第二收入</div>
      <div class="t-sub mt8" style="color:rgba(255,255,255,.85);">0 加盟费 · 平台带单 · 多劳多得</div>
    </div>
  </div>

  <div class="page has-cta">
    <!-- earnings -->
    <div class="page-pad" style="margin-top:-14px;">
      <div class="card card-pad">
        <div class="t-h3 mb12">管家月收入参考</div>
        <div class="row between txt-c">
          <div class="col"><div class="price t-brand" style="font-size:22px;">¥8K+</div><div class="t-cap mt2">兼职管家</div></div>
          <div style="width:1px;background:var(--hairline);"></div>
          <div class="col"><div class="price t-brand" style="font-size:22px;">¥2W+</div><div class="t-cap mt2">全职管家</div></div>
          <div style="width:1px;background:var(--hairline);"></div>
          <div class="col"><div class="price t-brand" style="font-size:22px;">¥5W+</div><div class="t-cap mt2">区域合伙</div></div>
        </div>
      </div>
    </div>

    <!-- benefits -->
    <div class="page-pad mt16">
      <div class="t-h2 mb12">加盟权益</div>
      <div class="col gap10">
        <div class="card card-pad row center gap12"><div class="cell-ic gold" style="width:38px;height:38px;"><span style="font-size:18px;">💸</span></div><div class="flex1"><div class="t-h3" style="font-size:14px;">订单分佣</div><div class="t-cap mt2">名下企业每单抽佣 8%-15%</div></div></div>
        <div class="card card-pad row center gap12"><div class="cell-ic" style="width:38px;height:38px;"><span style="font-size:18px;">🎯</span></div><div class="flex1"><div class="t-h3" style="font-size:14px;">平台带单</div><div class="t-cap mt2">系统自动分配周边企业客户</div></div></div>
        <div class="card card-pad row center gap12"><div class="cell-ic green" style="width:38px;height:38px;"><span style="font-size:18px;">🎓</span></div><div class="flex1"><div class="t-h3" style="font-size:14px;">免费培训</div><div class="t-cap mt2">营养搭配 + 销售话术全套赋能</div></div></div>
        <div class="card card-pad row center gap12"><div class="cell-ic blue" style="width:38px;height:38px;"><span style="font-size:18px;">📱</span></div><div class="flex1"><div class="t-h3" style="font-size:14px;">专属工具</div><div class="t-cap mt2">管家工作台 · 一键管理客户</div></div></div>
      </div>
    </div>

    <!-- process -->
    <div class="page-pad mt16">
      <div class="t-h2 mb12">加盟流程</div>
      <div class="card card-pad row between txt-c">
        <div class="col center flex1"><div class="avatar" style="width:34px;height:34px;font-size:14px;">1</div><div class="t-cap mt6" style="color:var(--ink);">提交申请</div></div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--ink-4)" stroke-width="2" style="align-self:center;"><path d="M9 6l6 6-6 6" stroke-linecap="round"/></svg>
        <div class="col center flex1"><div class="avatar" style="width:34px;height:34px;font-size:14px;background:var(--ink-3);">2</div><div class="t-cap mt6" style="color:var(--ink);">资质审核</div></div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--ink-4)" stroke-width="2" style="align-self:center;"><path d="M9 6l6 6-6 6" stroke-linecap="round"/></svg>
        <div class="col center flex1"><div class="avatar" style="width:34px;height:34px;font-size:14px;background:var(--ink-3);">3</div><div class="t-cap mt6" style="color:var(--ink);">培训上岗</div></div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--ink-4)" stroke-width="2" style="align-self:center;"><path d="M9 6l6 6-6 6" stroke-linecap="round"/></svg>
        <div class="col center flex1"><div class="avatar" style="width:34px;height:34px;font-size:14px;background:var(--ink-3);">4</div><div class="t-cap mt6" style="color:var(--ink);">开始接单</div></div>
      </div>
    </div>

    <!-- form -->
    <div class="page-pad mt16">
      <div class="t-h2 mb12">申请加盟</div>
      <div class="card card-pad col gap14">
        <div><div class="t-sub mb8">姓名</div><input style="width:100%;height:48px;border-radius:14px;border:1px solid var(--hairline);padding:0 16px;background:var(--surface-2);" placeholder="请输入姓名"></div>
        <div><div class="t-sub mb8">联系电话</div><input style="width:100%;height:48px;border-radius:14px;border:1px solid var(--hairline);padding:0 16px;background:var(--surface-2);" placeholder="请输入手机号"></div>
        <div><div class="t-sub mb8">意向区域</div><input style="width:100%;height:48px;border-radius:14px;border:1px solid var(--hairline);padding:0 16px;background:var(--surface-2);" placeholder="如 上海·浦东"></div>
        <div><div class="t-sub mb8">加盟类型</div><div class="row gap8"><span class="chip brand active" data-toggle-group="ft">兼职</span><span class="chip" data-toggle-group="ft" data-toast="全职">全职</span><span class="chip" data-toggle-group="ft" data-toast="区域合伙">区域合伙</span></div></div>
      </div>
    </div>
    <div class="page-bottom"></div>
  </div>

  <div class="ctabar">
    <button class="btn btn-gold btn-block" data-toast="申请已提交 · 招商经理将48h内联系您 🎉">提交加盟申请</button>
  </div>
  <div class="home-indicator"></div>
</div>
<script src="../assets/app.js"></script>
</body>
</html>
