<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>搜索</title>
<link rel="stylesheet" href="../assets/design-system.css">
</head>
<body>
<div class="screen">
  <div class="statusbar"><span data-clock>9:41</span>
    <span class="sb-right">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 9h3v6H2zM7 6h3v9H7zM12 3h3v12h-3zM17 7h3v8h-3z"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13a10 10 0 0 1 14 0M8.5 16.5a5 5 0 0 1 7 0M12 20h.01"/></svg>
      <svg viewBox="0 0 26 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="7" width="18" height="10" rx="3"/><rect x="4" y="9" width="13" height="6" rx="1.5" fill="currentColor" stroke="none"/></svg>
    </span>
  </div>
  <div class="navbar" style="gap:8px;padding-bottom:10px;">
    <button class="nav-btn" data-back><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 6l-6 6 6 6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <div class="searchbar flex1" style="background:var(--surface);box-shadow:var(--sh-1);">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" stroke-linecap="round"/></svg>
      <input id="q" style="border:none;background:transparent;outline:none;flex:1;color:var(--ink);font-size:14.5px;" placeholder="搜套餐 / 生鲜 / 菜系" autofocus>
    </div>
    <button class="t-brand" style="font-weight:700;font-size:15px;" data-go="canteen.html">搜索</button>
  </div>

  <div class="page">
    <!-- history -->
    <div class="page-pad mt8">
      <div class="row center between"><span class="t-h3">搜索历史</span><button class="nav-btn" data-toast="已清空历史"><svg viewBox="0 0 24 24" fill="none" stroke="var(--ink-3)" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>
      <div class="row gap8 wrap mt12">
        <span class="chip" data-go="product.html">麻油鸡套餐</span>
        <span class="chip" data-go="canteen.html">低卡轻食</span>
        <span class="chip" data-go="category.html">有机蔬菜</span>
        <span class="chip" data-go="product.html">狮子头</span>
      </div>
    </div>

    <!-- hot -->
    <div class="page-pad mt24">
      <div class="t-h3 mb12">🔥 热门搜索</div>
      <div class="cell-group">
        <a class="cell" data-go="product.html"><span class="badge badge-new" style="width:20px;justify-content:center;">1</span><span class="cell-t">晶香什锦套餐</span><span class="badge badge-brand">爆</span></a>
        <a class="cell" data-go="product.html"><span class="badge" style="width:20px;justify-content:center;background:var(--gold);color:#fff;">2</span><span class="cell-t">红烧肉套餐</span><span class="badge badge-gold">热</span></a>
        <a class="cell" data-go="canteen.html"><span class="badge badge-ink" style="width:20px;justify-content:center;">3</span><span class="cell-t">商务团餐</span></a>
        <a class="cell" data-go="category.html"><span class="badge badge-ink" style="width:20px;justify-content:center;">4</span><span class="cell-t">普罗旺斯番茄</span></a>
        <a class="cell" data-go="pinhaofan.html"><span class="badge badge-ink" style="width:20px;justify-content:center;">5</span><span class="cell-t">拼好饭</span></a>
      </div>
    </div>

    <!-- guess -->
    <div class="page-pad mt24">
      <div class="t-h3 mb12">猜你想吃</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <a class="card card-pad row center gap10" data-go="product.html"><div class="media g-warm" style="width:46px;height:46px;border-radius:12px;"><span style="font-size:24px;">🍗</span></div><div><div class="t-h3" style="font-size:13px;">麻油鸡套餐</div><div class="price t-brand mt2" style="font-size:14px;"><span class="cur">¥</span>28</div></div></a>
        <a class="card card-pad row center gap10" data-go="product.html"><div class="media g-rose" style="width:46px;height:46px;border-radius:12px;"><span style="font-size:24px;">🍱</span></div><div><div class="t-h3" style="font-size:13px;">什锦套餐</div><div class="price t-brand mt2" style="font-size:14px;"><span class="cur">¥</span>21</div></div></a>
      </div>
    </div>
    <div class="page-bottom"></div>
  </div>
  <div class="home-indicator"></div>
</div>
<script src="../assets/app.js"></script>
</body>
</html>
