<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>本地生活</title>
<link rel="stylesheet" href="../assets/design-system.css">
</head>
<body>
<div class="screen">
  <div class="brand-hero" style="flex:none;">
    <div class="statusbar on-brand"><span data-clock>9:41</span>
      <span class="sb-right">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 9h3v6H2zM7 6h3v9H7zM12 3h3v12h-3zM17 7h3v8h-3z"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13a10 10 0 0 1 14 0M8.5 16.5a5 5 0 0 1 7 0M12 20h.01"/></svg>
        <svg viewBox="0 0 26 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="7" width="18" height="10" rx="3"/><rect x="4" y="9" width="13" height="6" rx="1.5" fill="currentColor" stroke="none"/></svg>
      </span>
    </div>
    <div class="navbar on-brand" style="padding-bottom:8px;"><button class="nav-btn" data-go="home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 6l-6 6 6 6" stroke-linecap="round" stroke-linejoin="round"/></svg></button><span class="nav-title">本地生活</span></div>
    <div style="padding:0 16px 8px;"><div class="searchbar on-brand" data-go="search.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" stroke-linecap="round"/></svg><span>搜索附近美食 · 到店团购</span></div></div>
    <div class="chan-tabs" style="padding-top:0;padding-bottom:8px;">
      <a class="ct" data-go="home.html">云超鲜超</a><a class="ct" data-go="canteen.html">123新食堂</a><a class="ct active">本地生活</a><a class="ct" data-go="channel-mao.html">猫一筒</a><a class="ct" data-go="channel-kadi.html">卡蒂望</a>
    </div>
  </div>

  <div class="page has-tabbar">
    <!-- quick cats -->
    <div class="page-pad mt14">
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px 2px;">
        <div class="svc-cell" data-toast="美食"><div class="svc-ic g-rose">🍜</div><span class="svc-t">美食</span></div>
        <div class="svc-cell" data-toast="火锅"><div class="svc-ic g-warm">🍲</div><span class="svc-t">火锅</span></div>
        <div class="svc-cell" data-toast="咖啡饮品"><div class="svc-ic g-gold">☕</div><span class="svc-t">咖啡</span></div>
        <div class="svc-cell" data-toast="休闲娱乐"><div class="svc-ic g-purple">🎬</div><span class="svc-t">休闲</span></div>
        <div class="svc-cell" data-toast="丽人"><div class="svc-ic g-cool">💅</div><span class="svc-t">丽人</span></div>
      </div>
    </div>

    <!-- deal banner -->
    <div class="page-pad mt16">
      <div class="card g-gold card-pad row center between" style="box-shadow:none;">
        <div><div class="t-h3">超值团购券</div><div class="t-cap mt2">到店核销 · 随时退</div></div>
        <span class="badge badge-new">低至 3 折</span>
      </div>
    </div>

    <!-- nearby deals -->
    <div class="page-pad">
      <div class="section-head"><span class="t-h2">附近热门</span><span class="t-cap">距您 500m 内</span></div>
      <div class="col gap14">
        <div class="card card-pad row gap12" data-toast="查看商家详情">
          <div class="media g-warm" style="width:88px;height:88px;flex:none;"><span style="font-size:44px;">🍲</span></div>
          <div class="flex1">
            <div class="t-h3" style="font-size:15px;">蜀味轩老火锅</div>
            <div class="row center gap4 mt2" style="color:var(--gold);font-size:12px;">★ 4.8 <span class="t-cap" style="color:var(--ink-3);">· 月售 580 · 280m</span></div>
            <div class="card-flat row center between mt8" style="padding:8px 12px;"><div class="row center gap6"><span class="badge badge-brand">团购</span><span class="t-sub">双人套餐</span></div><div class="row center gap6"><span class="price t-brand"><span class="cur">¥</span>138</span><span class="price-old">¥268</span></div></div>
          </div>
        </div>
        <div class="card card-pad row gap12" data-toast="查看商家详情">
          <div class="media g-gold" style="width:88px;height:88px;flex:none;"><span style="font-size:44px;">☕</span></div>
          <div class="flex1">
            <div class="t-h3" style="font-size:15px;">云顶手冲咖啡</div>
            <div class="row center gap4 mt2" style="color:var(--gold);font-size:12px;">★ 4.9 <span class="t-cap" style="color:var(--ink-3);">· 月售 1200 · 120m</span></div>
            <div class="card-flat row center between mt8" style="padding:8px 12px;"><div class="row center gap6"><span class="badge badge-brand">团购</span><span class="t-sub">单杯特调</span></div><div class="row center gap6"><span class="price t-brand"><span class="cur">¥</span>19.9</span><span class="price-old">¥38</span></div></div>
          </div>
        </div>
        <div class="card card-pad row gap12" data-toast="查看商家详情">
          <div class="media g-rose" style="width:88px;height:88px;flex:none;"><span style="font-size:44px;">🍣</span></div>
          <div class="flex1">
            <div class="t-h3" style="font-size:15px;">江户前寿司</div>
            <div class="row center gap4 mt2" style="color:var(--gold);font-size:12px;">★ 4.7 <span class="t-cap" style="color:var(--ink-3);">· 月售 340 · 450m</span></div>
            <div class="card-flat row center between mt8" style="padding:8px 12px;"><div class="row center gap6"><span class="badge badge-brand">团购</span><span class="t-sub">怀石料理</span></div><div class="row center gap6"><span class="price t-brand"><span class="cur">¥</span>288</span><span class="price-old">¥488</span></div></div>
          </div>
        </div>
      </div>
    </div>
    <div class="page-bottom"></div>
  </div>

  <nav class="tabbar">
    <a class="tab" data-go="home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8M5 10v10h5v-6h4v6h5V10" stroke-linejoin="round"/></svg>首页</a>
    <a class="tab" data-go="category.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>分类</a>
    <a class="tab center" data-go="wish.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-4.3-9.3-9C1 8.5 3 5 6.5 5 9 5 11 7 12 8.5 13 7 15 5 17.5 5 21 5 23 8.5 21.3 12 19 16.7 12 21 12 21z"/></svg>我想吃</a>
    <a class="tab" data-go="cart.html"><span style="position:relative;display:inline-block;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 7h15l-1.5 9.5a2 2 0 0 1-2 1.7H8.5a2 2 0 0 1-2-1.7L5 7z" stroke-linejoin="round"/><path d="M8 7V6a4 4 0 0 1 8 0v1" stroke-linecap="round"/></svg><span class="cart-dot" data-cart-count style="display:none;">0</span></span>购物车</a>
    <a class="tab" data-go="profile.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6" stroke-linecap="round"/></svg>我的</a>
  </nav>
  <div class="home-indicator"></div>
</div>
<script src="../assets/app.js"></script>
</body>
</html>
