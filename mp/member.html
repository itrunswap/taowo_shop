<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>会员中心</title>
<link rel="stylesheet" href="../assets/design-system.css">
</head>
<body>
<div class="screen">
  <div style="flex:none;background:linear-gradient(160deg,#2a2018,#1d1d1f);">
    <div class="statusbar on-brand"><span data-clock>9:41</span>
      <span class="sb-right">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 9h3v6H2zM7 6h3v9H7zM12 3h3v12h-3zM17 7h3v8h-3z"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13a10 10 0 0 1 14 0M8.5 16.5a5 5 0 0 1 7 0M12 20h.01"/></svg>
        <svg viewBox="0 0 26 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="7" width="18" height="10" rx="3"/><rect x="4" y="9" width="13" height="6" rx="1.5" fill="currentColor" stroke="none"/></svg>
      </span>
    </div>
    <div class="navbar on-brand"><button class="nav-btn" data-back><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 6l-6 6 6 6" stroke-linecap="round" stroke-linejoin="round"/></svg></button><span class="nav-title">会员中心</span></div>
  </div>

  <div class="page has-cta">
    <!-- VIP card -->
    <div class="page-pad" style="padding-top:14px;">
      <div style="background:linear-gradient(135deg,#3a2c1a,#1d1d1f);border-radius:var(--r-xl);padding:20px;color:#fff;box-shadow:var(--sh-3);position:relative;overflow:hidden;">
        <div style="position:absolute;right:-20px;top:-20px;font-size:120px;opacity:.12;">👑</div>
        <div class="row center gap10">
          <div class="avatar" style="width:48px;height:48px;font-size:18px;border:2px solid var(--gold);">王</div>
          <div><div class="row center gap6"><span class="t-h3" style="color:#fff;">王经理</span><span class="vip-pill"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 6.9H22l-6 4.6 2.3 7L12 16.9 5.7 20.5 8 13.5 2 8.9h7.6z"/></svg>黄金会员</span></div><div class="t-cap mt2" style="color:rgba(255,255,255,.6);">有效期至 2026-12-31</div></div>
        </div>
        <div class="row mt20" style="justify-content:space-between;">
          <div data-go="coins.html"><div class="price" style="font-size:22px;color:var(--gold);">128.0</div><div class="t-cap" style="color:rgba(255,255,255,.6);">鲜币余额</div></div>
          <div><div class="price" style="font-size:22px;color:#fff;">2,860</div><div class="t-cap" style="color:rgba(255,255,255,.6);">成长值</div></div>
          <div><div class="price" style="font-size:22px;color:#fff;">12</div><div class="t-cap" style="color:rgba(255,255,255,.6);">优惠券</div></div>
        </div>
      </div>
    </div>

    <!-- benefits -->
    <div class="page-pad mt20">
      <div class="t-h2 mb12">会员特权</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px 4px;text-align:center;">
        <div class="col center gap6"><div style="font-size:30px;">💰</div><span class="t-cap" style="color:var(--ink);">会员折扣</span></div>
        <div class="col center gap6"><div style="font-size:30px;">🎫</div><span class="t-cap" style="color:var(--ink);">专属券包</span></div>
        <div class="col center gap6"><div style="font-size:30px;">🚀</div><span class="t-cap" style="color:var(--ink);">优先配送</span></div>
        <div class="col center gap6"><div style="font-size:30px;">🎂</div><span class="t-cap" style="color:var(--ink);">生日礼遇</span></div>
        <div class="col center gap6"><div style="font-size:30px;">🥢</div><span class="t-cap" style="color:var(--ink);">免配送费</span></div>
        <div class="col center gap6"><div style="font-size:30px;">🎁</div><span class="t-cap" style="color:var(--ink);">积分翻倍</span></div>
        <div class="col center gap6"><div style="font-size:30px;">🧑‍🍳</div><span class="t-cap" style="color:var(--ink);">专属管家</span></div>
        <div class="col center gap6"><div style="font-size:30px;">⭐</div><span class="t-cap" style="color:var(--ink);">新品尝鲜</span></div>
      </div>
    </div>

    <!-- plans -->
    <div class="page-pad mt24">
      <div class="t-h2 mb12">续费 / 升级</div>
      <div class="row gap10">
        <div class="card card-pad flex1 txt-c" data-toggle-group="plan" data-toast="已选 月卡">
          <div class="t-h3">月卡</div><div class="price t-brand mt6" style="font-size:22px;"><span class="cur">¥</span>15</div><div class="t-cap mt2">¥0.5/天</div>
        </div>
        <div class="card card-pad flex1 txt-c active" data-toggle-group="plan" style="border:2px solid var(--brand);position:relative;">
          <span class="badge badge-new" style="position:absolute;top:-9px;left:50%;translate:-50% 0;">最划算</span>
          <div class="t-h3">季卡</div><div class="price t-brand mt6" style="font-size:22px;"><span class="cur">¥</span>38</div><div class="t-cap mt2">¥0.42/天</div>
        </div>
        <div class="card card-pad flex1 txt-c" data-toggle-group="plan" data-toast="已选 年卡">
          <div class="t-h3">年卡</div><div class="price t-brand mt6" style="font-size:22px;"><span class="cur">¥</span>128</div><div class="t-cap mt2">¥0.35/天</div>
        </div>
      </div>
    </div>
    <div class="page-bottom"></div>
  </div>

  <div class="ctabar">
    <button class="btn btn-gold btn-block" data-toast="会员续费成功 🎉">立即续费 · 季卡 ¥38</button>
  </div>
  <div class="home-indicator"></div>
</div>
<script src="../assets/app.js"></script>
</body>
</html>
